
version: '3.8'

services:
  sentinel-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_master_v78
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./src/data:/app/src/data
    restart: always
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
